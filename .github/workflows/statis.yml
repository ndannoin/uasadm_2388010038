name: Deploy Web Statis

on:
  push:
    branches:
      - main

    paths:
      - 'web-statis/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/uas-statis:latest ./web-statis

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/uas-statis:latest

      - name: Deploy to AWS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}

          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/uas-statis:latest

            docker stop uas-statis || true
            docker rm uas-statis || true

            docker run -d \
              --name uas-statis \
              -p 80:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/uas-statis:latest