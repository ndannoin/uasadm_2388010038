name: Deploy Web Statis

on:
  push:
    branches:
      - main
    paths:
      - 'web-statis/**'
      - 'docker-compose.yml'
      - '.github/workflows/statis.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/uas-statis:latest ./web-statis

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/uas-statis:latest

      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          envs: GITHUB_TOKEN,GITHUB_REPOSITORY
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            GITHUB_REPOSITORY: ${{ github.repository }}
          script: |
            set -e
            DEPLOY_DIR="$HOME/uas-2388010038"
            REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

            # Clone repo jika belum ada
            if [ ! -d "$DEPLOY_DIR/.git" ] || ! git -C "$DEPLOY_DIR" rev-parse --is-inside-work-tree > /dev/null 2>&1; then
              rm -rf "$DEPLOY_DIR"
              git clone "$REPO_URL" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"

            # Update remote URL dengan token terbaru agar fetch berhasil
            git remote set-url origin "$REPO_URL"
            git fetch origin main
            git reset --hard origin/main

            # Pull image terbaru dan deploy statis saja
            docker compose pull uas-statis
            docker compose up -d --no-deps uas-statis