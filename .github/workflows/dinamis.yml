name: Deploy Web Dinamis

on:
  push:
    branches:
      - main
    paths:
      - 'web-dinamis/**' # Benar, membaca nama folder fisik di VS Code kamu

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          # Membangun image dari folder fisik web-dinamis
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/uas-dinamis:latest ./web-dinamis

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/uas-dinamis:latest

      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/uas-2388010038
            # 1. Tarik perubahan folder terbaru dari GitHub ke server AWS
            git pull origin main
            
            # 2. Tarik image terbaru dari Docker Hub ke dalam runtime
            docker compose pull web-dinamis
            docker compose up -d --no-deps web-dinamis
            
            # 3. Sinkronisasi otomatis file baru ke dalam jantung kontainer uas-dinamis
            docker cp /home/ubuntu/uas-2388010038/web-dinamis/index.php uas-dinamis:/var/www/html/index.php
            docker cp /home/ubuntu/uas-2388010038/web-dinamis/dashboard.php uas-dinamis:/var/www/html/dashboard.php
            
            # 4. Refresh kontainer uas-dinamis
            docker restart uas-dinamis