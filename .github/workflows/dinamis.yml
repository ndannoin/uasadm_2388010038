name: Deploy Web Dinamis

on:
  push:
    branches:
      - main
    paths:
      - 'web-dinamis/**' # Kriteria 1: Paths Filter Terisolasi (Sangat Baik)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/uas-dinamis:latest ./web-dinamis

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/uas-dinamis:latest

      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/uas-2388010038
            # 1. Tarik perubahan kode terbaru dari GitHub ke server AWS
            git pull origin main
            
            # 2. Tarik image terbaru dari Docker Hub
            docker compose pull web-dinamis
            docker compose up -d --no-deps web-dinamis
            
            # 3. Otomatisasi Sinkronisasi File (Biar kamu gak perlu ngetik di terminal lagi!)
            docker cp /home/ubuntu/uas-2388010038/web-dinamis/index.php uas-dinamis:/var/www/html/index.php
            docker cp /home/ubuntu/uas-2388010038/web-dinamis/dashboard.php uas-dinamis:/var/www/html/dashboard.php
            
            # 4. Segarkan kontainer
            docker restart uas-dinamis