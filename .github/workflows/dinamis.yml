name: Deploy Web Dinamis

on:
  push:
    branches:
      - main
    paths:
      - 'uas-dinamis/**' # SEKARANG SUDAH AKURAT SESUAI NAMA FOLDER KAMU

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          # Membaca folder uas-dinamis yang ada di laptop/GitHub kamu
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/uas-dinamis:latest ./uas-dinamis

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/uas-dinamis:latest

      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/uas-2388010038
            # 1. Tarik kode terbaru ke server AWS
            git pull origin main
            
            # 2. Tarik image baru dan jalankan service web-dinamis
            docker compose pull web-dinamis
            docker compose up -d --no-deps web-dinamis
            
            # 3. Sinkronisasi otomatis dari folder uas-dinamis server ke dalam jantung Docker
            docker cp /home/ubuntu/uas-2388010038/uas-dinamis/index.php uas-dinamis:/var/www/html/index.php
            docker cp /home/ubuntu/uas-2388010038/uas-dinamis/dashboard.php uas-dinamis:/var/www/html/dashboard.php
            
            # 4. Segarkan kontainer
            docker restart uas-dinamis