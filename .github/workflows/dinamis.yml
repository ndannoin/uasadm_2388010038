name: Deploy Web Dinamis

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'web-dinamis/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/web-dinamis:latest ./web-dinamis

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/web-dinamis:latest

      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/UASS_2388010038
            # Otomatis pull sesuai branch yang aktif
            git pull origin $(git branch --show-current)
            
            docker compose pull web-dinamis
            docker compose up -d --no-deps web-dinamis
            
            docker cp /home/ubuntu/UASS_2388010038/web-dinamis/index.php web-dinamis:/var/www/html/index.php
            docker cp /home/ubuntu/UASS_2388010038/web-dinamis/dashboard.php web-dinamis:/var/www/html/dashboard.php
            
            docker restart web-dinamis