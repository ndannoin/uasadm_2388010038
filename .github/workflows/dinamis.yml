name: Deploy Web Dinamis

on:
  push:
    branches:
      - main
    paths:
      - 'web-dinamis/**'
      - 'docker-compose.yml'
      - 'database/**'
      - '.github/workflows/dinamis.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/uas-dinamis:latest ./web-dinamis

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/uas-dinamis:latest

      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            set -e
            DEPLOY_DIR="$HOME/uas-2388010038"
            REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

            # Clone repo jika belum ada
            if [ ! -d "$DEPLOY_DIR/.git" ] || ! git -C "$DEPLOY_DIR" rev-parse --is-inside-work-tree > /dev/null 2>&1; then
              rm -rf "$DEPLOY_DIR"
              git clone "$REPO_URL" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"

            # Update remote URL dengan token terbaru agar fetch berhasil
            git remote set-url origin "$REPO_URL"
            git fetch origin main
            git reset --hard origin/main

            # Pull image terbaru dan deploy dinamis + MariaDB (dependency)
            docker compose pull uas-dinamis
            docker compose up -d uas-dinamis