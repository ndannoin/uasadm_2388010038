name: Deploy Web Dinamis

on:
  push:
    branches:
      - main
    paths:
      - 'web-dinamis/**' # Sangat Baik: Path terisolasi sesuai rubrik dosen

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/uas-dinamis:latest ./web-dinamis

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/uas-dinamis:latest

      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/uas-2388010038
            git pull origin main
            # Memanggil nama service yang benar (web-dinamis) agar Docker mengenali jalurnya
            docker compose pull web-dinamis
            docker compose up -d --no-deps web-dinamis