version: '3.8'

services:
  # REVERSE PROXY (Nginx sebagai pintu masuk utama port 80 publik)
  reverse-proxy:
    image: nginx:alpine
    container_name: uas-nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-statis
      - web-dinamis
    restart: always

  # WEB STATIS (Web CV Portofolio)
  web-statis:
    image: zaidanaliffirdaus/uas-statis:latest
    container_name: uas-statis
    expose:
      - "80"
    restart: always

  # WEB DINAMIS (Aplikasi PHP Apache)
  web-dinamis:
    image: zaidanaliffirdaus/uas-dinamis:latest
    container_name: uas-dinamis
    expose:
      - "80"
    environment:
      DATABASE_HOST: mariadb
      MYSQL_DATABASE: uasadm_2388010038
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    depends_on:
      mariadb:
        condition: service_healthy
    restart: always

  # DATABASE (MariaDB dengan Seeding Otomatis)
  mariadb:
    image: mariadb:11
    container_name: uas-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: uasadm_2388010038
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    volumes:
      - db_data:/var/lib/mysql
      - ./web-dinamis/database.sql:/docker-entrypoint-initdb.d/database.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "admin", "-padmin123"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  db_data: